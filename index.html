<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0e14;
  --surface: #141729;
  --border: #1a1d2e;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-muted: #475569;
  --text-faint: #334155;
  --accent: #6366f1;
  --accent-light: #a78bfa;
  --green: #22c55e;
  --red: #f87171;
  --gold: #FFD700;
  --silver: #C0C0C0;
  --bronze: #CD7F32;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ────────────────────────────── */
.header {
  padding: 28px 28px 0;
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 12px;
}
.title {
  font-family: 'Space Mono', monospace;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.08em;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  font-size: 13px;
  color: var(--text-muted);
  font-family: 'Space Mono', monospace;
  margin-top: 4px;
}
.header-actions { display: flex; gap: 8px; }

/* ── BUTTONS ───────────────────────────── */
.btn {
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  padding: 9px 18px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { filter: brightness(1.1); }
.btn:disabled { opacity: 0.5; cursor: default; filter: none; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-accent { background: var(--green); color: var(--bg); }
.btn-ghost {
  background: var(--surface);
  color: var(--text-dim);
  font-size: 17px;
  padding: 9px 13px;
}

/* ── SETTINGS ──────────────────────────── */
.settings-panel {
  padding: 14px 0 18px;
  margin-bottom: 14px;
  border-bottom: 1px solid var(--border);
  display: none;
}
.settings-panel.open { display: block; }
.label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
.hint a { color: var(--accent-light); }

/* ── INPUTS ────────────────────────────── */
.input-row, .add-row { display: flex; gap: 8px; }
.add-row { margin-bottom: 18px; }
input[type="text"], input[type="password"] {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 10px 14px;
  outline: none;
  min-width: 0;
  flex: 1;
  transition: border-color 0.15s;
}
input:focus { border-color: var(--accent); }

/* ── TABS ──────────────────────────────── */
.tabs { display: flex; gap: 2px; }
.tab {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 600;
  background: transparent;
  color: var(--text-muted);
  border: none;
  border-bottom: 2px solid transparent;
  padding: 9px 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.tab:hover { color: var(--text-dim); }
.tab.active {
  color: var(--accent-light);
  border-bottom-color: var(--accent);
}

/* ── STATUS ─────────────────────────────── */
.status {
  margin: 14px 28px 0;
  padding: 11px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  display: none;
  justify-content: space-between;
  align-items: center;
}
.status.visible { display: flex; }
.status.error {
  background: #2d1215;
  color: var(--red);
  border: 1px solid #451a1e;
}
.status.info {
  background: #0f1a2e;
  color: #60a5fa;
  border: 1px solid #1e2d4a;
}
.dismiss-btn {
  background: none;
  border: none;
  color: inherit;
  font-size: 18px;
  cursor: pointer;
  padding: 0 0 0 12px;
  opacity: 0.6;
}

/* ── LEADERBOARD ───────────────────────── */
.leaderboard { padding: 10px 28px 28px; }

.col-headers {
  display: grid;
  grid-template-columns: 48px 1fr 68px 110px 40px;
  align-items: center;
  padding: 14px 14px 10px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-family: 'Space Mono', monospace;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.col-stat, .col-views { text-align: right; }

/* ── ROW ───────────────────────────────── */
.row {
  display: grid;
  grid-template-columns: 48px 1fr 68px 110px 40px;
  align-items: center;
  padding: 11px 14px;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
  animation: fadeSlideIn 0.3s ease both;
  transition: background 0.15s;
}
.row:hover { background: rgba(99, 102, 241, 0.04); }

.row-bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, var(--accent), transparent);
  border-radius: 10px;
  pointer-events: none;
  transition: width 0.5s ease;
}

/* Rank */
.rank-col { position: relative; z-index: 1; }
.rank-badge {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  width: 28px;
  height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
}
.rank-badge.gold   { background: var(--gold);   color: #1a1a1a; }
.rank-badge.silver { background: var(--silver); color: #1a1a1a; }
.rank-badge.bronze { background: var(--bronze); color: #1a1a1a; }
.rank-num {
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  padding-left: 6px;
}

/* Channel */
.channel-col {
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
  z-index: 1;
  overflow: hidden;
}
.avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  border: 2px solid var(--border);
}
.avatar-placeholder {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-muted);
  flex-shrink: 0;
}
.channel-name {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Stats */
.stat-col {
  text-align: right;
  position: relative;
  z-index: 1;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
}

.views-col {
  text-align: right;
  position: relative;
  z-index: 1;
}
.views-num {
  font-family: 'Space Mono', monospace;
  font-size: 17px;
  font-weight: 700;
}

.action-col { text-align: right; position: relative; z-index: 1; }
.remove-btn {
  background: none;
  border: none;
  color: var(--text-faint);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  transition: color 0.15s;
}
.remove-btn:hover { color: var(--red); }

/* ── EMPTY STATE ───────────────────────── */
.empty {
  text-align: center;
  padding: 72px 24px;
}
.empty-icon { font-size: 44px; margin-bottom: 10px; }
.empty-title { font-size: 18px; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; }
.empty-hint {
  font-size: 14px;
  color: var(--text-muted);
  max-width: 420px;
  margin: 0 auto;
  line-height: 1.5;
}

/* ── FOOTER ────────────────────────────── */
.footer {
  padding: 18px 28px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 11px;
  color: var(--text-faint);
  font-family: 'Space Mono', monospace;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div>
      <div class="title">SHORTS TRACKER</div>
      <div class="subtitle" id="subtitle">0 channels tracked</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="toggleSettings()" title="Settings">⚙</button>
      <button class="btn btn-primary" id="refreshBtn" onclick="refreshAll()" disabled>↻ Refresh All</button>
    </div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="label">YouTube Data API Key</div>
    <div class="input-row">
      <input type="password" id="apiKeyInput" placeholder="AIzaSy..." onkeydown="if(event.key==='Enter')saveApiKey()">
      <button class="btn btn-primary" onclick="saveApiKey()">Save</button>
    </div>
    <p class="hint">
      Free key from <a href="https://console.cloud.google.com/apis/library/youtube.googleapis.com" target="_blank">console.cloud.google.com</a>
      → Enable YouTube Data API v3 → Credentials → Create API Key
    </p>
  </div>

  <div class="add-row">
    <input type="text" id="channelInput" placeholder="Paste channel URL or @handle..." onkeydown="if(event.key==='Enter')addChannel()">
    <button class="btn btn-accent" id="addBtn" onclick="addChannel()">+ Add</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-days="1" onclick="setTimePeriod(1, this)">24h</button>
    <button class="tab" data-days="7" onclick="setTimePeriod(7, this)">7 days</button>
    <button class="tab" data-days="14" onclick="setTimePeriod(14, this)">14 days</button>
    <button class="tab" data-days="30" onclick="setTimePeriod(30, this)">30 days</button>
  </div>
</header>

<div class="status" id="statusBar">
  <span id="statusText"></span>
  <button class="dismiss-btn" onclick="hideStatus()">×</button>
</div>

<div class="leaderboard" id="leaderboard"></div>

<footer class="footer">
  Refresh daily to build accurate weekly deltas · Views = Shorts only (≤60s videos)
</footer>

<script>
// ── State ───────────────────────────────────────────
const STORAGE_KEY = "yt-shorts-tracker-v2";
const API_KEY_KEY = "yt-shorts-api-key";
let state = { channels: {}, snapshots: {} };
let apiKey = "";
let timePeriod = 7;

// ── Init ────────────────────────────────────────────
(function init() {
  apiKey = localStorage.getItem(API_KEY_KEY) || "";
  document.getElementById("apiKeyInput").value = apiKey;
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
  // default to 7 day tab
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.days === '7');
  });
  timePeriod = 7;
  render();
})();

function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ── Helpers ─────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }
function daysAgoStr(d) {
  const dt = new Date();
  dt.setDate(dt.getDate() - d);
  return dt.toISOString().slice(0,10);
}
function formatViews(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,"") + "M";
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,"") + "K";
  return String(n);
}
function parseDuration(iso) {
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0);
}

// ── Status bar ──────────────────────────────────────
function showStatus(msg, type) {
  const bar = document.getElementById("statusBar");
  const text = document.getElementById("statusText");
  bar.className = "status visible " + type;
  text.textContent = msg;
}
function hideStatus() {
  document.getElementById("statusBar").className = "status";
}

// ── Settings ────────────────────────────────────────
function toggleSettings() {
  document.getElementById("settingsPanel").classList.toggle("open");
}
function saveApiKey() {
  apiKey = document.getElementById("apiKeyInput").value.trim();
  localStorage.setItem(API_KEY_KEY, apiKey);
  document.getElementById("settingsPanel").classList.remove("open");
  showStatus("API key saved", "info");
  setTimeout(hideStatus, 2000);
}

// ── Time period ─────────────────────────────────────
function setTimePeriod(days, btn) {
  timePeriod = days;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── YouTube API ─────────────────────────────────────
const YT = "https://www.googleapis.com/youtube/v3";

async function ytFetch(endpoint, params) {
  const url = new URL(`${YT}/${endpoint}`);
  params.key = apiKey;
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  const res = await fetch(url);
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err?.error?.message || `API error ${res.status}`);
  }
  return res.json();
}

async function resolveChannelId(input) {
  input = input.trim();
  // @handle
  const atMatch = input.match(/@([\w.-]+)/);
  if (atMatch) {
    const data = await ytFetch("channels", { part:"id", forHandle: atMatch[1] });
    if (data.items?.length) return data.items[0].id;
    const s = await ytFetch("search", { part:"snippet", q:atMatch[1], type:"channel", maxResults:"1" });
    if (s.items?.length) return s.items[0].snippet.channelId;
    throw new Error("Channel not found: " + input);
  }
  // /channel/UCxxx
  const chMatch = input.match(/channel\/(UC[\w-]+)/);
  if (chMatch) return chMatch[1];
  // bare UC id
  if (/^UC[\w-]{22}$/.test(input)) return input;
  // /c/ or /user/ or bare name
  const cMatch = input.match(/\/(c|user)\/([\w.-]+)/);
  const name = cMatch ? cMatch[2] : input.replace(/^https?:\/\/(www\.)?youtube\.com\/?/, "").replace(/\//g,"");
  if (name) {
    const s = await ytFetch("search", { part:"snippet", q:name, type:"channel", maxResults:"1" });
    if (s.items?.length) return s.items[0].snippet.channelId;
  }
  throw new Error("Could not resolve: " + input);
}

async function getChannelInfo(channelId) {
  const data = await ytFetch("channels", { part:"snippet,contentDetails", id:channelId });
  if (!data.items?.length) throw new Error("Channel not found");
  const ch = data.items[0];
  return {
    id: ch.id,
    title: ch.snippet.title,
    thumbnail: ch.snippet.thumbnails?.default?.url || "",
    uploadsPlaylistId: ch.contentDetails?.relatedPlaylists?.uploads,
  };
}

async function getRecentVideos(playlistId, maxPages) {
  let videos = [], pageToken = "";
  for (let i = 0; i < maxPages; i++) {
    const params = { part:"snippet", playlistId, maxResults:"50" };
    if (pageToken) params.pageToken = pageToken;
    const data = await ytFetch("playlistItems", params);
    videos = videos.concat(data.items.map(it => ({
      id: it.snippet.resourceId.videoId,
      title: it.snippet.title,
    })));
    pageToken = data.nextPageToken;
    if (!pageToken) break;
  }
  return videos;
}

async function getVideoDetails(videoIds) {
  const results = {};
  for (let i = 0; i < videoIds.length; i += 50) {
    const batch = videoIds.slice(i, i+50);
    const data = await ytFetch("videos", { part:"contentDetails,statistics", id:batch.join(",") });
    for (const item of (data.items || [])) {
      const dur = parseDuration(item.contentDetails.duration);
      results[item.id] = {
        duration: dur,
        isShort: dur > 0 && dur <= 60,
        viewCount: parseInt(item.statistics.viewCount || "0"),
      };
    }
  }
  return results;
}

// ── Add channel ─────────────────────────────────────
async function addChannel() {
  if (!apiKey) { showStatus("Add your YouTube API key first (⚙ icon)", "error"); toggleSettings(); return; }
  const input = document.getElementById("channelInput").value.trim();
  if (!input) return;

  document.getElementById("addBtn").disabled = true;
  document.getElementById("addBtn").textContent = "Adding...";
  hideStatus();

  try {
    showStatus("Resolving channel...", "info");
    const channelId = await resolveChannelId(input);

    if (state.channels[channelId]) {
      showStatus("Channel already added", "error");
      document.getElementById("addBtn").disabled = false;
      document.getElementById("addBtn").textContent = "+ Add";
      return;
    }

    showStatus("Fetching channel info...", "info");
    const info = await getChannelInfo(channelId);

    showStatus("Loading recent videos...", "info");
    const videos = await getRecentVideos(info.uploadsPlaylistId, 3);

    showStatus("Checking Shorts & view counts...", "info");
    const details = await getVideoDetails(videos.map(v => v.id));

    state.channels[channelId] = { title: info.title, thumbnail: info.thumbnail };
    if (!state.snapshots[channelId]) state.snapshots[channelId] = {};

    const today = todayStr();
    let count = 0;
    for (const video of videos) {
      const d = details[video.id];
      if (d?.isShort) {
        count++;
        if (!state.snapshots[channelId][video.id]) state.snapshots[channelId][video.id] = {};
        state.snapshots[channelId][video.id][today] = d.viewCount;
      }
    }

    persist();
    render();
    document.getElementById("channelInput").value = "";
    showStatus(`Added ${info.title} — ${count} Shorts found`, "info");
    setTimeout(hideStatus, 3000);
  } catch(e) {
    showStatus(e.message, "error");
  }

  document.getElementById("addBtn").disabled = false;
  document.getElementById("addBtn").textContent = "+ Add";
}

// ── Remove channel ──────────────────────────────────
function removeChannel(channelId) {
  delete state.channels[channelId];
  delete state.snapshots[channelId];
  persist();
  render();
}

// ── Refresh all ─────────────────────────────────────
async function refreshAll() {
  if (!apiKey) { showStatus("Add your YouTube API key first", "error"); toggleSettings(); return; }
  const ids = Object.keys(state.channels);
  if (!ids.length) return;

  const btn = document.getElementById("refreshBtn");
  btn.disabled = true;
  btn.textContent = "↻ Refreshing...";
  const today = todayStr();
  let done = 0;

  for (const channelId of ids) {
    done++;
    showStatus(`Refreshing ${done}/${ids.length}: ${state.channels[channelId]?.title || channelId}`, "info");

    try {
      const uploadsId = "UU" + channelId.slice(2);
      const videos = await getRecentVideos(uploadsId, 3);
      const details = await getVideoDetails(videos.map(v => v.id));

      if (!state.snapshots[channelId]) state.snapshots[channelId] = {};
      for (const video of videos) {
        const d = details[video.id];
        if (d?.isShort) {
          if (!state.snapshots[channelId][video.id]) state.snapshots[channelId][video.id] = {};
          state.snapshots[channelId][video.id][today] = d.viewCount;
        }
      }
    } catch(e) {
      console.error(`Error refreshing ${channelId}:`, e);
    }

    // Rate limit buffer
    await new Promise(r => setTimeout(r, 250));
  }

  persist();
  render();
  btn.disabled = false;
  btn.textContent = "↻ Refresh All";
  showStatus(`Refreshed ${done} channels`, "info");
  setTimeout(hideStatus, 3000);
}

// ── Compute leaderboard ─────────────────────────────
function computeLeaderboard() {
  const baseline = daysAgoStr(timePeriod);
  const entries = [];

  for (const [channelId, channel] of Object.entries(state.channels)) {
    let totalDelta = 0, totalViews = 0;
    const channelSnaps = state.snapshots[channelId] || {};
    let vidCount = 0;

    for (const [videoId, snapDates] of Object.entries(channelSnaps)) {
      vidCount++;
      const sorted = Object.keys(snapDates).sort();
      const latest = sorted[sorted.length - 1];
      const latestViews = snapDates[latest] || 0;
      totalViews += latestViews;

      let baseViews = 0;
      for (const d of sorted) {
        if (d <= baseline) baseViews = snapDates[d];
        else break;
      }
      if (sorted[0] > baseline) baseViews = 0;

      totalDelta += (latestViews - baseViews);
    }

    entries.push({
      channelId,
      name: channel.title,
      thumbnail: channel.thumbnail,
      weeklyViews: totalDelta,
      totalViews,
      videoCount: vidCount,
    });
  }

  entries.sort((a,b) => b.weeklyViews - a.weeklyViews);
  return entries;
}

// ── Render ───────────────────────────────────────────
function render() {
  const channelCount = Object.keys(state.channels).length;

  // Subtitle
  let lastDate = "";
  for (const ch of Object.values(state.snapshots)) {
    for (const vid of Object.values(ch)) {
      for (const d of Object.keys(vid)) { if (d > lastDate) lastDate = d; }
    }
  }
  document.getElementById("subtitle").textContent =
    `${channelCount} channel${channelCount!==1?"s":""} tracked` +
    (lastDate ? ` · Last snapshot: ${lastDate}` : "");

  document.getElementById("refreshBtn").disabled = channelCount === 0;

  const container = document.getElementById("leaderboard");

  if (!channelCount) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📊</div>
        <div class="empty-title">No channels tracked yet</div>
        <div class="empty-hint">${!apiKey
          ? 'Start by adding your YouTube API key (⚙ icon), then paste competitor channel URLs.'
          : 'Paste a YouTube channel URL or @handle above to start tracking.'}</div>
      </div>`;
    return;
  }

  const entries = computeLeaderboard();
  const maxViews = entries[0]?.weeklyViews || 1;
  const periodLabel = timePeriod === 1 ? "24h" : timePeriod + "d";

  let html = `
    <div class="col-headers">
      <span>#</span>
      <span>Channel</span>
      <span class="col-stat">Shorts</span>
      <span class="col-views">Views (${periodLabel})</span>
      <span></span>
    </div>`;

  entries.forEach((e, i) => {
    const rank = i + 1;
    const barW = Math.max(2, (e.weeklyViews / maxViews) * 100);
    const barOp = rank <= 3 ? 0.15 : 0.07;

    let rankHtml;
    if (rank === 1) rankHtml = `<span class="rank-badge gold">1</span>`;
    else if (rank === 2) rankHtml = `<span class="rank-badge silver">2</span>`;
    else if (rank === 3) rankHtml = `<span class="rank-badge bronze">3</span>`;
    else rankHtml = `<span class="rank-num">${rank}</span>`;

    const viewColor = rank === 1 ? "var(--gold)" : rank === 2 ? "var(--silver)" : rank === 3 ? "var(--bronze)" : "var(--text)";

    const avatarHtml = e.thumbnail
      ? `<img class="avatar" src="${e.thumbnail}" alt="">`
      : `<div class="avatar-placeholder">${(e.name||"?")[0].toUpperCase()}</div>`;

    html += `
      <div class="row" style="animation-delay:${i*0.04}s">
        <div class="row-bar" style="width:${barW}%;opacity:${barOp}"></div>
        <div class="rank-col">${rankHtml}</div>
        <div class="channel-col">
          ${avatarHtml}
          <span class="channel-name">${escHtml(e.name)}</span>
        </div>
        <div class="stat-col">${e.videoCount}</div>
        <div class="views-col">
          <span class="views-num" style="color:${viewColor}">${formatViews(e.weeklyViews)}</span>
        </div>
        <div class="action-col">
          <button class="remove-btn" onclick="removeChannel('${e.channelId}')" title="Remove">×</button>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
