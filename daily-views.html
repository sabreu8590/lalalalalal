<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Views Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0e14;--surface:#141729;--border:#1a1d2e;--text:#e2e8f0;--dim:#94a3b8;--muted:#475569;--faint:#334155;--accent:#6366f1;--green:#22c55e;--red:#f87171;--gold:#FFD700;--silver:#C0C0C0;--bronze:#CD7F32}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.wrap{max-width:700px;margin:0 auto;padding:24px 20px}

h1{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;letter-spacing:.08em;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.sub{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:20px}

.setup{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.setup label{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px}
.setup input{font-family:'Space Mono',monospace;font-size:13px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;width:100%;outline:none;margin-bottom:10px}
.setup input:focus{border-color:var(--accent)}
.setup textarea{font-family:'Space Mono',monospace;font-size:12px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;width:100%;outline:none;resize:vertical;min-height:80px;line-height:1.6}
.setup .hint{font-size:11px;color:var(--muted);margin-top:6px}

.actions{display:flex;gap:8px;margin:16px 0}
.btn{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;transition:.15s}
.btn:disabled{opacity:.4;cursor:default}
.btn-go{background:var(--green);color:var(--bg)}
.btn-clear{background:var(--surface);color:var(--dim);border:1px solid var(--border)}

.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.msg.show{display:block}
.msg.info{background:#0f1a2e;color:#60a5fa;border:1px solid #1e2d4a}
.msg.err{background:#2d1215;color:var(--red);border:1px solid #451a1e}

/* Table */
.tbl{width:100%;border-collapse:collapse;margin-top:12px}
.tbl th{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;text-align:left;padding:10px 8px;border-bottom:1px solid var(--border)}
.tbl th:nth-child(n+3){text-align:right}
.tbl td{padding:10px 8px;border-bottom:1px solid rgba(26,29,46,.5);font-size:14px}
.tbl td:nth-child(n+3){text-align:right;font-family:'Space Mono',monospace;font-size:14px;font-weight:700}
.tbl tr{animation:fadeIn .3s ease both}

.rank{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px}
.r1{background:var(--gold);color:#1a1a1a}
.r2{background:var(--silver);color:#1a1a1a}
.r3{background:var(--bronze);color:#1a1a1a}
.rn{color:var(--muted)}

.ch{display:flex;align-items:center;gap:8px;overflow:hidden}
.ch img{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);flex-shrink:0}
.ch span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;font-size:14px}

.v1{color:var(--gold)}
.v2{color:var(--silver)}
.v3{color:var(--bronze)}
.vn{color:var(--text)}

.total{color:var(--dim);font-weight:400!important;font-size:12px!important}

.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}

.foot{text-align:center;font-size:11px;color:var(--faint);font-family:'Space Mono',monospace;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <h1>DAILY VIEWS</h1>
  <div class="sub" id="sub">Paste channels, hit snapshot, come back tomorrow</div>

  <details class="setup" id="setupPanel">
    <summary style="cursor:pointer;font-weight:600;font-size:13px;color:var(--dim)">⚙ Setup</summary>
    <div style="margin-top:12px">
      <label>YouTube API Key</label>
      <input type="password" id="keyInput" placeholder="AIzaSy...">
      <label>Channel URLs (one per line)</label>
      <textarea id="channelsInput" placeholder="@MrBeast&#10;@ZackDFilms&#10;https://youtube.com/@WholesomeWendy&#10;UCxxxxxx"></textarea>
      <div class="hint">Handles, URLs, or channel IDs — one per line. Free API key from console.cloud.google.com → YouTube Data API v3.</div>
      <div style="margin-top:10px">
        <button class="btn btn-go" onclick="saveSetup()">Save</button>
      </div>
    </div>
  </details>

  <div class="actions">
    <button class="btn btn-go" id="snapBtn" onclick="takeSnapshot()">📸 Take Snapshot</button>
    <button class="btn btn-clear" onclick="if(confirm('Clear all data?')){localStorage.clear();location.reload()}">Reset</button>
  </div>

  <div class="msg" id="msg"></div>
  <div id="board"></div>

  <div class="foot">
    Snapshot once a day · Views = total channel views (all videos) · Delta = today minus yesterday
  </div>
</div>

<script>
const K = "dv-key", C = "dv-channels", S = "dv-snapshots";

let apiKey = localStorage.getItem(K) || "";
let channels = JSON.parse(localStorage.getItem(C) || "[]");
let snapshots = JSON.parse(localStorage.getItem(S) || "{}");

document.getElementById("keyInput").value = apiKey;
document.getElementById("channelsInput").value = channels.map(c => c.input).join("\n");

render();

function msg(text, type) {
  const el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg show " + type;
}
function hideMsg() { document.getElementById("msg").className = "msg"; }

function saveSetup() {
  apiKey = document.getElementById("keyInput").value.trim();
  localStorage.setItem(K, apiKey);
  const lines = document.getElementById("channelsInput").value.split("\n").map(l => l.trim()).filter(Boolean);
  // We'll resolve these when we snapshot
  channels = lines.map(l => ({ input: l, id: null, title: l, thumb: "" }));
  localStorage.setItem(C, JSON.stringify(channels));
  msg("Saved! Now hit Take Snapshot.", "info");
  setTimeout(hideMsg, 2000);
}

async function ytFetch(ep, params) {
  const url = new URL("https://www.googleapis.com/youtube/v3/" + ep);
  params.key = apiKey;
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  const r = await fetch(url);
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e?.error?.message || "API error " + r.status); }
  return r.json();
}

async function resolveId(input) {
  input = input.trim();
  const at = input.match(/@([\w.-]+)/);
  if (at) {
    const d = await ytFetch("channels", { part:"id,snippet,statistics", forHandle:at[1] });
    if (d.items?.length) return d.items[0];
  }
  const ch = input.match(/channel\/(UC[\w-]+)/);
  if (ch) {
    const d = await ytFetch("channels", { part:"id,snippet,statistics", id:ch[1] });
    if (d.items?.length) return d.items[0];
  }
  if (/^UC[\w-]{22}$/.test(input)) {
    const d = await ytFetch("channels", { part:"id,snippet,statistics", id:input });
    if (d.items?.length) return d.items[0];
  }
  // fallback search
  const s = await ytFetch("search", { part:"snippet", q:input.replace(/^https?:\/\/(www\.)?youtube\.com\/?/,"").replace(/\//g,""), type:"channel", maxResults:"1" });
  if (s.items?.length) {
    const d = await ytFetch("channels", { part:"id,snippet,statistics", id:s.items[0].snippet.channelId });
    if (d.items?.length) return d.items[0];
  }
  return null;
}

async function takeSnapshot() {
  if (!apiKey) { msg("Add your API key first", "err"); return; }
  if (!channels.length) { msg("Add channels first", "err"); return; }

  const btn = document.getElementById("snapBtn");
  btn.disabled = true;
  btn.textContent = "Working...";
  const today = new Date().toISOString().slice(0,10);

  for (let i = 0; i < channels.length; i++) {
    msg(`Fetching ${i+1}/${channels.length}: ${channels[i].input}`, "info");
    try {
      // If we already have the channel ID and just need fresh stats
      if (channels[i].id) {
        const d = await ytFetch("channels", { part:"statistics,snippet", id:channels[i].id });
        if (d.items?.length) {
          const item = d.items[0];
          channels[i].title = item.snippet.title;
          channels[i].thumb = item.snippet.thumbnails?.default?.url || "";
          if (!snapshots[channels[i].id]) snapshots[channels[i].id] = {};
          snapshots[channels[i].id][today] = parseInt(item.statistics.viewCount || "0");
        }
      } else {
        const item = await resolveId(channels[i].input);
        if (item) {
          channels[i].id = item.id;
          channels[i].title = item.snippet.title;
          channels[i].thumb = item.snippet.thumbnails?.default?.url || "";
          if (!snapshots[item.id]) snapshots[item.id] = {};
          snapshots[item.id][today] = parseInt(item.statistics.viewCount || "0");
        }
      }
    } catch(e) {
      console.error(e);
    }
    await new Promise(r => setTimeout(r, 200));
  }

  localStorage.setItem(C, JSON.stringify(channels));
  localStorage.setItem(S, JSON.stringify(snapshots));
  render();
  btn.disabled = false;
  btn.textContent = "📸 Take Snapshot";
  msg("Snapshot done for " + today, "info");
  setTimeout(hideMsg, 3000);
}

function formatViews(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,"") + "M";
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,"") + "K";
  return String(n);
}

function render() {
  const board = document.getElementById("board");
  const resolved = channels.filter(c => c.id && snapshots[c.id]);
  if (!resolved.length) {
    board.innerHTML = '<div class="empty">No data yet. Add channels in setup, then take a snapshot.</div>';
    return;
  }

  // Find today and yesterday
  const allDates = new Set();
  Object.values(snapshots).forEach(s => Object.keys(s).forEach(d => allDates.add(d)));
  const dates = [...allDates].sort();
  const latest = dates[dates.length - 1];
  const prev = dates.length > 1 ? dates[dates.length - 2] : null;

  // Build entries
  const entries = resolved.map(c => {
    const s = snapshots[c.id];
    const todayViews = s[latest] || 0;
    const prevViews = prev ? (s[prev] || 0) : 0;
    const delta = prev ? todayViews - prevViews : null;
    return { ...c, todayViews, delta };
  });

  // Sort by delta (or total if no delta yet)
  entries.sort((a,b) => {
    if (a.delta !== null && b.delta !== null) return b.delta - a.delta;
    if (a.delta !== null) return -1;
    if (b.delta !== null) return 1;
    return b.todayViews - a.todayViews;
  });

  const dayLabel = prev ? `${prev} → ${latest}` : latest;
  document.getElementById("sub").textContent = prev
    ? `${dates.length} snapshots · showing daily delta`
    : `1 snapshot taken · come back tomorrow for daily views`;

  let html = `<table class="tbl"><thead><tr>
    <th style="width:36px">#</th>
    <th>Channel</th>
    <th>Daily Views</th>
    <th>Total</th>
  </tr></thead><tbody>`;

  entries.forEach((e, i) => {
    const rank = i + 1;
    const rc = rank === 1 ? "r1" : rank === 2 ? "r2" : rank === 3 ? "r3" : "rn";
    const vc = rank === 1 ? "v1" : rank === 2 ? "v2" : rank === 3 ? "v3" : "vn";

    html += `<tr style="animation-delay:${i*.03}s">
      <td><span class="rank ${rc}">${rank}</span></td>
      <td><div class="ch">
        ${e.thumb ? `<img src="${e.thumb}" alt="">` : ""}
        <span>${esc(e.title)}</span>
      </div></td>
      <td class="${vc}">${e.delta !== null ? formatViews(e.delta) : "—"}</td>
      <td class="total">${formatViews(e.todayViews)}</td>
    </tr>`;
  });

  html += "</tbody></table>";
  board.innerHTML = html;
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
